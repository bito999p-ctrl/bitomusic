<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AETHERMASTER // 移転のお知らせ</title>
  <!-- SEO & Redirect -->
  <meta http-equiv="refresh" content="3; url=https://bito999p-ctrl.github.io/aether_master/">
  <link rel="canonical" href="https://bito999p-ctrl.github.io/aether_master/">
  <meta name="robots" content="noindex, follow">
  
  <!-- Fonts & Styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #08090c;
      --panel-bg: rgba(15, 18, 25, 0.7);
      --accent-blue: #00f2fe;
      --accent-purple: #4facfe;
      --text-main: #f0f3f8;
      --text-muted: #8b9bb4;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .card {
      background: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: fadeIn 0.8s ease-out;
    }
    
    .logo {
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: 0.15em;
      margin-bottom: 25px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
    }
    
    .spinner-box {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 242, 254, 0.1);
      border-top: 3px solid var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 15px;
    }
    
    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 25px;
    }
    
    a {
      display: inline-block;
      color: var(--text-main);
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
      transition: all 0.3s ease;
    }
    
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">AETHERMASTER</div>
    <h1>URL移転のお知らせ</h1>
    <div class="spinner-box">
      <div class="spinner"></div>
    </div>
    <p>
      AetherMaster は、独立した専用リポジトリへ移行しました。<br>
      3秒後に自動的に新しいページへ移動します。
    </p>
    <a href="https://bito999p-ctrl.github.io/aether_master/">今すぐ移動する</a>
  </div>

</body>
</html>
